<!DOCTYPE html>
<html>
<head>
    <title>Queen's RPS Game 👑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #1a1a1a;
            color: white;
            padding: 50px;
        }
        h1 { color: #ff6b6b; }
        button {
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #ff6b6b;
            color: white;
        }
        button:hover { background: #ff5252; }
        p { margin-top: 40px; }
         @media (max-width: 600px) {
            h1 { font-size: 26px; }
            button {
                width: 85%;
                max-width: 280px;
                font-size: 18px;
                padding: 16px 20px;
                margin: 8px auto;
                display: block;
            }
            body { padding: 15px; }
        }
    </style>
</head>
<body>
    <h1><b>Rock Paper Scissors Game</b></h1>
    <p>Queen's First Game 🎮</p>

    <button onclick="playGame('Rock')">Rock 🪨</button>
    
    <button onclick="playGame('Paper')">Paper 📄</button>
    
    <button onclick="playGame('Scissors')">Scissors ✂️</button>
    
    <p><a href="../" style="color: #ff6b6b;">← Back to GT650 Garage</a></p>

    <script>
        function playGame(playerMove) {
            const randomNumber = Math.random();
            let computerMove = '';
            
            if(randomNumber < 1/3) {
                computerMove = 'Rock';
            } else if(randomNumber < 2/3) {
                computerMove = 'Paper';
            } else {
                computerMove = 'Scissors';
            }
            
            let result = '';
            
            if(playerMove === computerMove) {
                result = 'Tie';
            } else if(
                (playerMove === 'Rock' && computerMove === 'Scissors') ||
                (playerMove === 'Paper' && computerMove === 'Rock') ||
                (playerMove === 'Scissors' && computerMove === 'Paper')
            ) {
                result = 'You Win! 👑';
            } else {
                result = 'You Lose';
            }
            
            alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}`);
        }
    </script>
</body>
</html>
